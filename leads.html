<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:sans-serif; padding:20px;">

  <h2 id="title">Leads</h2>

  <button onclick="downloadCSV()" style="margin-bottom:20px;">
    Download CSV
  </button>

  <div id="list">Loading...</div>

  <script>
    let exportData = [];

    async function loadLeads() {

      const SUPABASE_URL = "https://uwxnoxpnhzpeyfcbklci.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eG5veHBuaHpwZXlmY2JrbGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQxNjUsImV4cCI6MjA5MTkyMDE2NX0.mu9uvIEGVuOTvYqNl9XGG9NcQTn43pVpAfTiNEPbqEo";

      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const params = new URLSearchParams(window.location.search);
      const client_id = params.get("client") || "default";

      document.getElementById("title").innerText = "Leads: " + client_id;

      const { data: interactions } = await client
        .from("interactions")
        .select("*")
        .eq("client_id", client_id)
        .order("created_at", { ascending: true });

      const userIds = [...new Set(interactions.map(i => i.user_id))];

      const { data: users } = await client
        .from("users")
        .select("*")
        .in("id", userIds);

      const grouped = {};

      interactions.forEach(i => {
        const user = users.find(u => u.id === i.user_id);
        if (!user || !user.phone) return;

        const phone = user.phone;

        if (!grouped[phone]) {
          grouped[phone] = {
            name: user.name,
            phone: phone,
            email: user.email || "",
            first_seen: i.created_at,
            last_seen: i.created_at,
            count: 1
          };
        } else {
          grouped[phone].last_seen = i.created_at;
          grouped[phone].count++;
        }
      });

      let html = "";
      exportData = [];

      Object.values(grouped).forEach(g => {

        const first = new Date(g.first_seen).toLocaleString();
        const last = new Date(g.last_seen).toLocaleString();

        // UI
        html += `
          <div style="padding:12px; border-bottom:1px solid #ccc;">
            <strong>${g.name || "No name"}</strong><br>
            ${g.phone}<br><br>

            <small>
              First seen: ${first}<br>
              Last seen: ${last}<br>
              Visits: ${g.count}
            </small>
          </div>
        `;

        // CSV data
        exportData.push([
          g.name || "",
          g.phone,
          g.email,
          client_id,
          first,
          last,
          g.count
        ]);
      });

      document.getElementById("list").innerHTML = html;
    }

    function downloadCSV() {

      let csv = "Name,Phone,Email,Source,First Seen,Last Seen,Visits\n";

      exportData.forEach(row => {
        csv += row.map(val => `"${val}"`).join(",") + "\n";
      });

      const blob = new Blob([csv], { type: "text/csv" });
      const url = window.URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "leads.csv";
      a.click();
    }

    loadLeads();
  </script>

</body>
</html>

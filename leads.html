<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:sans-serif; padding:20px;">

  <h2 id="title">Leads</h2>

  <div id="list">Loading...</div>

  <script>
    async function loadLeads() {

      const SUPABASE_URL = "https://uwxnoxpnhzpeyfcbklci.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eG5veHBuaHpwZXlmY2JrbGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQxNjUsImV4cCI6MjA5MTkyMDE2NX0.mu9uvIEGVuOTvYqNl9XGG9NcQTn43pVpAfTiNEPbqEo";

      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const params = new URLSearchParams(window.location.search);
      const client_id = params.get("client") || "default";

      document.getElementById("title").innerText = "Leads: " + client_id;

      // 1. Get interactions
      const { data: interactions, error: iError } = await client
        .from("interactions")
        .select("*")
        .eq("client_id", client_id)
        .order("created_at", { ascending: true });

      if (iError) {
        document.getElementById("list").innerText = iError.message;
        return;
      }

      if (!interactions.length) {
        document.getElementById("list").innerText = "No leads yet";
        return;
      }

      // 2. Get unique user IDs
      const userIds = [...new Set(
        interactions.map(i => i.user_id).filter(Boolean)
      )];

      // 3. Fetch users
      const { data: users, error: uError } = await client
        .from("users")
        .select("*")
        .in("id", userIds);

      if (uError) {
        document.getElementById("list").innerText = uError.message;
        return;
      }

      // 4. Map users
      const userMap = {};
      users.forEach(u => userMap[u.id] = u);

      // 5. Group interactions by user
      const grouped = {};

      interactions.forEach(i => {
        if (!grouped[i.user_id]) {
          grouped[i.user_id] = {
            first_seen: i.created_at,
            last_seen: i.created_at,
            count: 1
          };
        } else {
          grouped[i.user_id].last_seen = i.created_at;
          grouped[i.user_id].count++;
        }
      });

      // 6. Render
      let html = "";

      Object.keys(grouped).forEach(user_id => {
        const user = userMap[user_id];
        if (!user) return;

        const g = grouped[user_id];

        const first = new Date(g.first_seen).toLocaleString();
        const last = new Date(g.last_seen).toLocaleString();

        html += `
          <div style="padding:12px; border-bottom:1px solid #ccc;">
            <strong>${user.name || "No name"}</strong><br>
            ${user.phone || ""}<br><br>

            <small>
              First seen: ${first}<br>
              Last seen: ${last}<br>
              Visits: ${g.count}
            </small>
          </div>
        `;
      });

      document.getElementById("list").innerHTML = html;
    }

    loadLeads();
  </script>

</body>
</html>

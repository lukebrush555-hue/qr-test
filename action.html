<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Back</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #0F0F10;
      --card: #1A1A1D;
      --accent: #D4AF37;
      --text: #FFF;
      --sub: #B0B0B0;
      --line: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .brand {
      text-align: center;
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.75;
      margin-bottom: 12px;
    }

    .headline {
      text-align: center;
      font-size: 24px;
      margin-bottom: 18px;
    }

    .saved-box {
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      padding: 16px;
      margin-bottom: 18px;
    }

    .label {
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .saved-text {
      font-size: 16px;
      line-height: 1.5;
    }

    .notes {
      width: 100%;
      min-height: 110px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 14px;
      margin-bottom: 16px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #111;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .btn-secondary {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
    }

    .powered {
      text-align: center;
      margin-top: 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="brand">BARBERSHOP NAME</div>

    <div class="headline" id="welcome">Welcome back</div>

    <div class="saved-box">
      <div class="label">Saved haircut</div>
      <div class="saved-text" id="savedText">Loading...</div>
    </div>

    <textarea class="notes" id="editBox" placeholder="Update your haircut..."></textarea>

    <button class="btn" onclick="useSaved()">Use This Haircut</button>
    <button class="btn-secondary" onclick="update()">Update Saved Haircut</button>

    <div class="powered">Powered by YOURNAME</div>
  </div>

<script>
const SUPABASE_URL = "https://uwxnoxpnhzpeyfcbklci.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eG5veHBuaHpwZXlmY2JrbGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQxNjUsImV4cCI6MjA5MTkyMDE2NX0.mu9uvIEGVuOTvYqNl9XGG9NcQTn43pVpAfTiNEPbqEo";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user_id = localStorage.getItem("user_id");

async function load() {

  const { data } = await client
    .from("users")
    .select("notes, name")
    .eq("id", user_id)
    .single();

  if (data) {
    if (data.name) {
      document.getElementById("welcome").innerText = "Welcome back, " + data.name;
    }
    if (data.notes) {
      document.getElementById("savedText").innerText = data.notes;
      document.getElementById("editBox").value = data.notes;
    }
  }
}

async function update() {

  const newNotes = document.getElementById("editBox").value;

  await client
    .from("users")
    .update({ notes: newNotes })
    .eq("id", user_id);

  document.getElementById("savedText").innerText = newNotes;
}

function useSaved() {
  alert("Haircut confirmed");
}

load();
</script>

</body>
</html>

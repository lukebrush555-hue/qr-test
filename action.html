<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saving Contact...</title>
</head>

<body style="font-family:sans-serif; text-align:center; padding:40px;">

  <h2>Saving contact...</h2>
  <p>If nothing happens, tap below.</p>

  <br>

  <button onclick="downloadVCF()"
    style="padding:15px 25px; font-size:18px;">
    Save Contact
  </button>

  <script>
    function downloadVCF() {
      const user = JSON.parse(localStorage.getItem("user") || "{}");
      const sharePhone = localStorage.getItem("sharePhone") === "true";
      const shareEmail = localStorage.getItem("shareEmail") === "true";

      let vcf = "BEGIN:VCARD\nVERSION:3.0\n";
      vcf += "FN:Alex Mercer\nORG:Handshake Labs\n";

      if (sharePhone && user.phone) {
        vcf += "TEL;TYPE=CELL:" + user.phone + "\n";
      }

      if (shareEmail && user.email) {
        vcf += "EMAIL:" + user.email + "\n";
      }

      vcf += "END:VCARD";

      const blob = new Blob([vcf], { type: "text/vcard" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "contact_" + Date.now() + ".vcf";

      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    window.onload = function() {
      downloadVCF();
    };
  </script>

</body>
</html>

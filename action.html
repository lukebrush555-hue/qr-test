<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved</title>

  <style>
    :root {
      --bg: #0F0F10;
      --card: #1A1A1D;
      --accent: #D4AF37;
      --text: #FFF;
      --sub: #B0B0B0;
      --line: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      text-align: center;
    }

    .brand {
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.75;
      margin-bottom: 24px;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 999px;
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check {
      font-size: 30px;
      color: var(--accent);
      line-height: 1;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.1;
    }

    .sub {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--sub);
      line-height: 1.45;
    }

    .next {
      margin: 0 0 24px;
      font-size: 14px;
      color: var(--sub);
      line-height: 1.45;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #111;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .secondary {
      margin-top: 12px;
      font-size: 13px;
      color: var(--sub);
    }

    .powered {
      margin-top: 18px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="brand">BUSINESS NAME</div>

    <div class="icon-wrap">
      <div class="check">✓</div>
    </div>

    <h1>Saved</h1>
    <p class="sub">Your information has been saved.</p>

    <div class="next">
      Placeholder text for what happens next.
    </div>

    <button class="btn">Done</button>
    <div class="secondary">Close this page</div>

    <div class="powered">Powered by YOURNAME</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<style>
:root {
  --bg:#0F0F10;
  --card:#1A1A1D;
  --accent:#D4AF37;
  --text:#FFF;
  --sub:#B0B0B0;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 420px;
  background: var(--card);
  border-radius: 24px;
  padding: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
}

.brand {
  text-align: center;
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.7;
  margin-bottom: 18px;
}

h1 {
  font-size: 26px;
  margin: 0 0 6px;
  text-align: center;
}

.sub {
  text-align: center;
  font-size: 14px;
  color: var(--sub);
  margin-bottom: 20px;
}

/* SOCIAL BUTTONS */

.social-btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 12px;
}

.apple {
  background: #000;
  color: #fff;
}

.google {
  background: #fff;
  color: #111;
}

.divider {
  text-align: center;
  font-size: 12px;
  color: var(--sub);
  margin: 16px 0;
}

/* INPUTS */

.input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: #111;
  color: #fff;
  font-size: 14px;
}

/* CTA */

.btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: var(--accent);
  color: #111;
  font-size: 16px;
  font-weight: 700;
  margin-top: 6px;
}

.micro {
  text-align: center;
  font-size: 11px;
  color: var(--sub);
  margin-top: 12px;
}
</style>
</head>

<body>

<div class="card">

  <div class="brand">FADE KINGS</div>

  <h1>Save once</h1>
  <div class="sub">Placeholder text goes here</div>

  <button class="social-btn apple">Continue with Apple</button>
  <button class="social-btn google">Continue with Google</button>

  <div class="divider">— or —</div>

  <input class="input" placeholder="Name">
  <input class="input" placeholder="Phone">
  <input class="input" placeholder="Email">

  <button class="btn">Save & Continue</button>

  <div class="micro">Placeholder consent text</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#0F0F10;
  --card:#1A1A1D;
  --accent:#D4AF37;
  --text:#FFF;
  --sub:#B0B0B0;
  --line: rgba(255,255,255,0.08);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 420px;
  background: var(--card);
  border-radius: 24px;
  padding: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
}

.brand {
  text-align: center;
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.7;
  margin-bottom: 18px;
}

h1 {
  font-size: 26px;
  margin: 0 0 6px;
  text-align: center;
}

.sub {
  text-align: center;
  font-size: 14px;
  color: var(--sub);
  margin-bottom: 20px;
}

.input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.03);
  color: var(--text);
}

.btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: var(--accent);
  color: #111;
  font-size: 16px;
  font-weight: 700;
}

.micro {
  text-align: center;
  font-size: 11px;
  color: var(--sub);
  margin-top: 12px;
}
</style>
</head>

<body>

<div class="card">

  <div class="brand">BARBERSHOP NAME</div>

  <h1>Save once</h1>
  <div class="sub">Next time, it’s automatic</div>

  <input class="input" id="name" placeholder="Your name">
  <input class="input" id="phone" placeholder="Phone number">
  <input class="input" id="email" placeholder="Email">
  <input class="input" id="zip" placeholder="ZIP Code">

  <button class="btn" onclick="createUser()">Save & Continue</button>

  <div class="micro">Used only to make your visits easier</div>

</div>

<script>
const SUPABASE_URL = "https://uwxnoxpnhzpeyfcbklci.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eG5veHBuaHpwZXlmY2JrbGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQxNjUsImV4cCI6MjA5MTkyMDE2NX0.mu9uvIEGVuOTvYqNl9XGG9NcQTn43pVpAfTiNEPbqEo";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const client_id = params.get("client") || "default";

async function createUser() {

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const zip = document.getElementById("zip").value;

  const { data, error } = await client
    .from("users")
    .insert([{
      name: name,
      phone: phone,
      email: email,
      zip: zip
    }])
    .select()
    .single();

  if (data) {
    localStorage.setItem("user_id", data.id);
    window.location.href = "capture.html?client=" + client_id;
  }
}
</script>

</body>
</html>

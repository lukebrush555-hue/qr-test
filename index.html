<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:sans-serif; text-align:center; padding:40px;">

  <p id="status">Starting...</p>

  <script>
    async function init() {

      document.getElementById("status").innerText = "Step 1: Init";

      const SUPABASE_URL = "https://uwxnoxpnhzpeyfcbklci.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eG5veHBuaHpwZXlmY2JrbGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQxNjUsImV4cCI6MjA5MTkyMDE2NX0.mu9uvIEGVuOTvYqNl9XGG9NcQTn43pVpAfTiNEPbqEo";

      document.getElementById("status").innerText = "Step 2: Creating client";

      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      document.getElementById("status").innerText = "Step 3: Reading URL";

      const params = new URLSearchParams(window.location.search);
      const client_id = params.get("client") || "default";

      document.getElementById("status").innerText = "Step 4: Checking user";

      let user_id = localStorage.getItem("user_id");

      if (!user_id) {
        document.getElementById("status").innerText = "Redirecting to capture...";
        window.location.href = "capture.html?client=" + client_id;
        return;
      }

      document.getElementById("status").innerText = "Step 5: Logging interaction";

      try {
        const { error } = await supabaseClient
          .from("interactions")
          .insert([{
            user_id: user_id,
            client_id: client_id,
            fields_shared: {}
          }]);

        if (error) {
          document.getElementById("status").innerText = "ERROR: " + error.message;
          return;
        }

      } catch (e) {
        document.getElementById("status").innerText = "CRASH: " + e.message;
        return;
      }

      document.getElementById("status").innerText = "Redirecting to action...";

      window.location.href = "action.html";
    }

    init();
  </script>

</body>
</html>

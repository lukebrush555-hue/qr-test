<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:sans-serif; text-align:center; padding:40px;">

  <p>Loading...</p>

  <script>
    const SUPABASE_URL = "https://uwxnoxpnhzpeyfcbklci.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eG5veHBuaHpwZXlmY2JrbGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQxNjUsImV4cCI6MjA5MTkyMDE2NX0.mu9uvIEGVuOTvYqNl9XGG9NcQTn43pVpAfTiNEPbqEo";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function init() {

      // 1. Get client_id from URL
      const params = new URLSearchParams(window.location.search);
      const client_id = params.get("client") || "default";

      // 2. Check if user exists locally
      let user_id = localStorage.getItem("user_id");

      if (!user_id) {
        // First-time user → go to capture
        window.location.href = "capture.html?client=" + client_id;
        return;
      }

      // 3. Log interaction
      try {
        const { error } = await client
          .from("interactions")
          .insert([{
            user_id: user_id,
            client_id: client_id,
            fields_shared: {}
          }]);

        if (error) {
          console.error("Interaction error:", error);
        }

      } catch (e) {
        console.error("Crash:", e);
      }

      // 4. Continue to action
      window.location.href = "action.html";
    }

    init();
  </script>

</body>
</html>

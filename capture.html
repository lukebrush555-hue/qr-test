<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barber Page</title>

  <style>
    :root {
      --bg: #0F0F10;
      --card: #1A1A1D;
      --accent: #D4AF37;
      --text: #FFF;
      --sub: #B0B0B0;
      --line: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .brand {
      text-align: center;
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.75;
      margin-bottom: 16px;
    }

    .hero {
      width: 100%;
      display: block;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .headline-box {
      border: 1px solid rgba(212,175,55,0.55);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      margin-bottom: 18px;
      background: rgba(255,255,255,0.02);
    }

    .headline-box .kicker {
      font-size: 12px;
      letter-spacing: 1.6px;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .headline-box h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .notes {
      width: 100%;
      min-height: 120px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 14px;
      font-size: 15px;
      line-height: 1.4;
      resize: none;
      margin-bottom: 18px;
    }

    .checks {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--sub);
      font-size: 15px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
    }

    .check input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #111;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .skip {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: var(--sub);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="brand">BARBERSHOP NAME</div>

    <img
      class="hero"
      src="https://lukebrush555-hue.github.io/qr-test/fade.jpg"
      alt="Barbershop"
    >

    <div class="headline-box">
      <div class="kicker">PREFERENCE</div>
      <h2>Remember my haircut</h2>
    </div>

    <div class="section-title">Haircut details</div>
    <textarea class="notes" placeholder="3 on top, 1 on the side, low fade, keep the widow's peak."></textarea>

    <div class="section-title">Choose what to share</div>

    <div class="checks">
      <label class="check"><input type="checkbox" checked> Name</label>
      <label class="check"><input type="checkbox" checked> Phone Number</label>
      <label class="check"><input type="checkbox"> Email Address</label>
      <label class="check"><input type="checkbox"> ZIP Code</label>
    </div>

    <button class="btn">Save</button>
    <div class="skip">Not now</div>
  </div>
</body>
</html>

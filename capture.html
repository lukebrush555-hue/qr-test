<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:sans-serif; text-align:center; padding:40px;">

  <h2>Enter your info</h2>

  <input id="name" placeholder="Name"><br><br>
  <input id="phone" placeholder="Phone"><br><br>

  <button onclick="save()">Continue</button>

  <script>
    const SUPABASE_URL = "PASTE_URL_HERE";
    const SUPABASE_KEY = "PASTE_ANON_KEY_HERE";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const client_id = params.get("client") || "default";

    async function save() {

      const name = document.getElementById("name").value;
      const phone = document.getElementById("phone").value;

      if (!name || !phone) {
        alert("Enter required fields");
        return;
      }

      try {
        // 1. Save user
        const { data, error } = await client
          .from("users")
          .insert([{ name, phone }])
          .select();

        if (error) {
          alert(error.message);
          return;
        }

        const user_id = data[0].id;
        localStorage.setItem("user_id", user_id);

        // 2. Log FIRST interaction immediately
        await client.from("interactions").insert([{
          user_id: user_id,
          client_id: client_id,
          fields_shared: {}
        }]);

        // 3. Continue
        window.location.href = "action.html";

      } catch (e) {
        alert("Error: " + e.message);
      }
    }
  </script>

</body>
</html>

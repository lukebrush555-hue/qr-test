<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Your Info</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 16px;
      outline: none;
    }

    textarea {
      height: 80px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.02);
      opacity: 0.95;
    }

    .label {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2 id="title">Save your info</h2>

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">

    <div id="notes-label" class="label">Notes</div>
    <textarea id="notes"></textarea>

    <button onclick="save()">Save</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const client_id = params.get("client") || "default";

    const CONFIG = {
      "barber-k8f3q2": {
        title: "Never explain your haircut again",
        notesLabel: "Haircut",
        placeholder: "4 on top, 1 on sides...",
      }
    };

    const cfg = CONFIG[client_id] || {};

    document.getElementById("title").innerText = cfg.title || "Save your info";
    document.getElementById("notes-label").innerText = cfg.notesLabel || "Notes";
    document.getElementById("notes").placeholder = cfg.placeholder || "Add any preferences...";

    async function save() {

      const SUPABASE_URL = "https://uwxnoxpnhzpeyfcbklci.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eG5veHBuaHpwZXlmY2JrbGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQxNjUsImV4cCI6MjA5MTkyMDE2NX0.mu9uvIEGVuOTvYqNl9XGG9NcQTn43pVpAfTiNEPbqEo";

      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const name = document.getElementById("name").value;
      const phone = document.getElementById("phone").value;
      const notes = document.getElementById("notes").value;

      if (!name || !phone) {
        alert("Enter required fields");
        return;
      }

      const { data } = await client
        .from("users")
        .insert([{ name, phone, notes }])
        .select();

      const user_id = data[0].id;

      await client.from("interactions").insert([{
        user_id,
        client_id,
        fields_shared: {}
      }]);

      document.querySelector(".card").innerHTML = `
        <h2>Saved</h2>
        <p style="opacity:0.7;">Next time, no explanation needed.</p>
      `;
    }
  </script>

</body>
</html>

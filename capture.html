<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Contact</title>
</head>

<body style="font-family:sans-serif; text-align:center; padding:40px;">

  <h2>Save contact. No typing again.</h2>

  <br>

  <input id="phone" placeholder="Phone number"
    style="padding:12px; font-size:16px; width:220px;"
    inputmode="numeric"
    oninput="formatPhone(this)">

  <br><br>

  <button onclick="save()"
    style="padding:12px 20px; font-size:16px;">
    Continue
  </button>

  <script>
    function formatPhone(input) {
      let numbers = input.value.replace(/\D/g, "").slice(0, 10);

      let formatted = "";

      if (numbers.length > 0) {
        formatted = numbers.substring(0, 3);
      }
      if (numbers.length >= 4) {
        formatted += "-" + numbers.substring(3, 6);
      }
      if (numbers.length >= 7) {
        formatted += "-" + numbers.substring(6, 10);
      }

      input.value = formatted;
    }

    function save() {
      const raw = document.getElementById("phone").value;
      const phone = raw.replace(/\D/g, "");

      if (phone.length < 10) {
        alert("Enter a valid phone number");
        return;
      }

      localStorage.setItem("user", phone);

      window.location.href = "action.html";
    }
  </script>

</body>
</html>

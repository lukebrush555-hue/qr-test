<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="config/clients.js"></script>

<style>
:root {
  --bg:#0F0F10;
  --card:#1A1A1D;
  --accent:#D4AF37;
  --text:#FFF;
  --sub:#B0B0B0;
}

body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:20px;
}

.card {
  width:100%;
  max-width:400px;
  background:var(--card);
  border-radius:20px;
  padding:20px;
}

.header {
  text-align:center;
  margin-bottom:15px;
  font-size:12px;
  letter-spacing:2px;
  opacity:.7;
}

img {
  width:100%;
  border-radius:14px;
  margin-bottom:15px;
}

.offer {
  border:1px solid var(--accent);
  border-radius:14px;
  padding:15px;
  text-align:center;
  margin-bottom:15px;
}

.offer small { color:var(--sub); }

.checks {
  margin-bottom:15px;
}

.checks label {
  display:block;
  margin-bottom:8px;
  color:var(--sub);
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:var(--accent);
  font-weight:600;
}

.skip {
  text-align:center;
  margin-top:10px;
  font-size:13px;
  color:var(--sub);
}
</style>
</head>

<body>

<div class="card">
  <div class="header" id="name"></div>

  <img id="img">

  <div class="offer">
    <div id="offerTitle"></div>
    <h3 id="offer"></h3>
    <small id="sub"></small>
  </div>

  <div class="checks">
    <label><input type="checkbox" checked> VIP Cuts List</label>
    <label><input type="checkbox"> Deals & Discounts</label>
    <label><input type="checkbox"> SMS Reminders</label>
  </div>

  <button id="cta"></button>
  <div class="skip">Not now</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("client") || "barber1";
const c = clients[id];

document.getElementById("name").innerText = c.name;
document.getElementById("img").src = c.image;
document.getElementById("offerTitle").innerText = c.offerTitle;
document.getElementById("offer").innerText = c.offer;
document.getElementById("sub").innerText = c.subtext;
document.getElementById("cta").innerText = c.cta;

document.documentElement.style.setProperty('--bg', c.colors.bg);
document.documentElement.style.setProperty('--card', c.colors.card);
document.documentElement.style.setProperty('--accent', c.colors.accent);
</script>

</body>
</html>

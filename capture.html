<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:sans-serif; text-align:center; padding:40px;">

  <h2>TEST SAVE</h2>

  <input id="name" placeholder="Name"><br><br>
  <input id="phone" placeholder="Phone"><br><br>

  <button onclick="save()">Save</button>

  <script>
    alert("PAGE LOADED");

    async function save() {
      alert("CLICK REGISTERED");

      const SUPABASE_URL = "https://uwxnoxpnhzpeyfcbklci.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eG5veHBuaHpwZXlmY2JrbGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQxNjUsImV4cCI6MjA5MTkyMDE2NX0.mu9uvIEGVuOTvYqNl9XGG9NcQTn43pVpAfTiNEPbqEo";

      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const name = document.getElementById("name").value;
      const phone = document.getElementById("phone").value;

      try {
        const { data, error } = await client
          .from("users")
          .insert([{ name, phone }])
          .select();

        if (error) {
          alert("ERROR: " + error.message);
          return;
        }

        alert("SUCCESS");

      } catch (e) {
        alert("CRASH: " + e.message);
      }
    }
  </script>

</body>
</html>

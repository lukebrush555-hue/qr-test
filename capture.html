<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fade Kings</title>

  <style>
    :root {
      --bg:#0F0F10;
      --card:#1A1A1D;
      --accent:#D4AF37;
      --text:#FFF;
      --sub:#B0B0B0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .brand {
      text-align: center;
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.75;
      margin-bottom: 16px;
    }

    .hero {
      width: 100%;
      display: block;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .offer {
      border: 1px solid rgba(212,175,55,0.55);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      margin-bottom: 18px;
      background: rgba(255,255,255,0.02);
    }

    .offer-kicker {
      font-size: 12px;
      letter-spacing: 1.6px;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .offer h2 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.15;
    }

    .offer p {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
    }

    .share-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .checks {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--sub);
      font-size: 15px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
    }

    .check input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #111;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .skip {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: var(--sub);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="brand">FADE KINGS</div>

    <img
      class="hero"
      src="https://lukebrush555-hue.github.io/qr-test/fade.jpg"
      alt="Barbershop"
    >

    <div class="offer">
      <div class="offer-kicker">TODAY’S UPGRADE</div>
      <h2>Free Line-Up / Edge-Up</h2>
      <p>Takes 2 minutes</p>
    </div>

    <div class="share-title">Choose what to share:</div>

    <div class="checks">
      <label class="check"><input type="checkbox" checked> Phone Number</label>
      <label class="check"><input type="checkbox"> Email Address</label>
      <label class="check"><input type="checkbox"> Birthday</label>
    </div>

    <button class="btn">Claim My Upgrade</button>
    <div class="skip">Not now</div>
  </div>
</body>
</html>
